<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記憶力テスト</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: white;
      --text: #111;
      --muted: #666;
      --accent: #2b6cff;
      --accent2: #444;
      --card: #f5f5f5;
      --border: #ddd;
      --overlay: rgba(0, 0, 0, 0.5);
      --success: #0a7a26;
      --danger: #b10000;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      position: relative;
    }

    .tap-anywhere {
      width: 100%;
      height: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-wrap {
      width: min(920px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .title {
      font-size: clamp(24px, 3vw, 40px);
      font-weight: 700;
      line-height: 1.35;
    }

    .subtitle {
      font-size: clamp(16px, 2vw, 22px);
      line-height: 1.7;
      color: var(--muted);
    }

    .small {
      font-size: 15px;
      color: var(--muted);
    }

    .panel {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }

    .meta-box {
      width: min(780px, 100%);
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-align: left;
      line-height: 1.7;
    }

    .meta-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }

    .meta-line:last-child {
      border-bottom: none;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .button {
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .button.secondary {
      background: var(--accent2);
    }

    .button.ghost {
      background: white;
      color: #222;
      border: 1px solid #bbb;
    }

    .button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .big-number {
      font-size: clamp(56px, 10vw, 120px);
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1;
      user-select: none;
    }

    .progress-wrap {
      width: min(720px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .countdown {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 700;
      line-height: 1;
    }

    .bar {
      width: 100%;
      height: 18px;
      background: #e5e5e5;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #d0d0d0;
    }

    .bar-inner {
      height: 100%;
      width: 100%;
      background: #111;
      transform-origin: left center;
    }

    .input-box {
      width: min(560px, 100%);
      font-size: clamp(22px, 4vw, 34px);
      padding: 16px 18px;
      border-radius: 14px;
      border: 2px solid #bbb;
      outline: none;
      text-align: center;
      letter-spacing: 0.15em;
      font-family: inherit;
    }

    .input-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(43, 108, 255, 0.12);
    }

    .top-info {
      position: absolute;
      top: 18px;
      left: 18px;
      font-size: 14px;
      color: var(--muted);
      text-align: left;
      line-height: 1.5;
    }

    .result-list {
      width: min(780px, 100%);
      max-height: 48vh;
      overflow: auto;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
      text-align: left;
    }

    .result-row {
      display: grid;
      grid-template-columns: 90px 70px 1fr 110px;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
      font-size: 15px;
      align-items: center;
    }

    .result-row.header {
      font-weight: 700;
      background: #fafafa;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .good {
      color: var(--success);
      font-weight: 700;
    }

    .bad {
      color: var(--danger);
      font-weight: 700;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 16px;
      text-align: left;
    }

    .stat-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .session-item {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      background: white;
      padding: 14px;
      text-align: left;
    }

    .session-item-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .session-detail {
      font-size: 14px;
      color: #444;
      line-height: 1.7;
    }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      background: #f0f0f0;
      font-size: 12px;
      color: #333;
    }

    .color-stats {
      margin-bottom: 16px;
    }

    .color-stats-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .color-stat-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      background: white;
      text-align: left;
    }

    .color-stat-name {
      font-weight: 700;
      font-size: 16px;
    }

    .color-stat-detail {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
    }

    .input-card {
      width: min(420px, 100%);
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(900px, 100%);
      max-height: min(84vh, 900px);
      background: white;
      border-radius: 18px;
      padding: 20px;
      overflow: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .status-box {
      width: min(760px, 100%);
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-align: left;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="storageModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <div class="title" style="font-size: 24px;">保存データの統計</div>
        <button class="button ghost" id="closeStorageModal">閉じる</button>
      </div>
      <div id="storageModalBody"></div>
    </div>
  </div>
